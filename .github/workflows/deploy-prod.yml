name: Deploy to PROD

on:
  push:
    branches:
      - main

jobs:
  deploy-backend-prod:
    name: Deploy Backend → Render PROD
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render PROD deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
        env:
          RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}

  deploy-frontend-prod:
    name: Deploy Frontend → Vercel PROD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (PROD)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_VITE_API_BASE_URL }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: frontend
