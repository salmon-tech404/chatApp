name: Deploy to STG

on:
  push:
    branches:
      - develop

jobs:
  deploy-backend-stg:
    name: Deploy Backend → Render STG
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render STG deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_STG_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
        env:
          RENDER_STG_DEPLOY_HOOK: ${{ secrets.RENDER_STG_DEPLOY_HOOK }}

  deploy-frontend-stg:
    name: Deploy Frontend → Vercel STG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (STG)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.STG_VITE_API_BASE_URL }}

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
