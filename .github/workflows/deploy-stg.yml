name: Deploy to STG

on:
  push:
    branches:
      - develop

jobs:
  ci-and-deploy:
    name: TypeScript Check → Deploy STG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Trigger Render STG deploy
        run: curl -s "${{ secrets.RENDER_STG_DEPLOY_HOOK }}" --fail
